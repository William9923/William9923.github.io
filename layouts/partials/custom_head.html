      --code-color: #e0e0e0;
    }

  html[data-theme="dark"] {

  nav {
    display: flex;
    align-items: center;

  #theme-toggle {
    background: none;
    border: 2px solid var(--link-color);
    border-radius: 4px;
    font-size: 1.2em;
    padding: 2px 8px;
    margin-left: auto;
    cursor: pointer;
    opacity: 0.8;
  }

  #theme-toggle:hover {
    opacity: 1;
  }

  img {
    display: block;
    margin: 0 auto;
  }

  p em:only-child {
    display: block;
    text-align: center;
    font-style: italic;
  }

  pre {
    background-color: var(--code-bg);
    color: var(--code-color);
    padding: 1em;
    border-radius: 6px;
    overflow-x: auto;
    font-size: 0.9em;
    line-height: 1.45;
  }

  pre code {
    background-color: transparent;
    color: inherit;
    padding: 0;
  }

  li code {
    background-color: var(--code-bg);
    color: var(--code-color);
